# Ultra-lean CI — lint + typecheck only
# No browser install. No test runner. Zero wasted minutes.
# Heavy E2E runs on Railway post-deploy, not here.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5          # Hard cap — if it takes longer something is wrong

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm             # Cache node_modules across runs

      - name: Install deps (no optional, no postinstall browsers)
        run: npm ci --ignore-scripts

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
